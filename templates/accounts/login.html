{% load static i18n %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Kirish" %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-store"></i></div>
        <h2>{% trans "Marketplace Admin" %}</h2>
        <p class="subtitle">{% trans "Tizimga kirish uchun ma'lumotlaringizni kiriting" %}</p>
        <form method="post">
            {% csrf_token %}
            <label>{% trans "Username" %}</label>
            <input class="form-control" type="text" name="username" required>
            <label>{% trans "Password" %}</label>
            <input class="form-control" type="password" name="password" required>
            <button type="submit" class="btn btn-primary">{% trans "Kirish" %}</button>
        </form>
    </div>
</body>
</html>

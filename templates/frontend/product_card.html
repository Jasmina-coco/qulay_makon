<div class="product-card">
    <a href="{% url 'product_page' product.id %}">
        {% with main_img=product.images.first %}
            {% if main_img %}
            <img src="{{ main_img.image.url }}" alt="{{ product.name }}">
            {% else %}
            <div class="no-image">No image</div>
            {% endif %}
        {% endwith %}
        <h4>{{ product.name }}</h4>
        <p class="price">{{ product.price|floatformat:0 }} UZS</p>
    </a>
</div>

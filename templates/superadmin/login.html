<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box { background:#fff; padding:40px; border-radius:12px; width:380px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
        .login-box h2 { text-align:center; margin-bottom:6px; font-size:22px; }
        .login-box p { text-align:center; color:#888; font-size:13px; margin-bottom:24px; }
        .login-box label { display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:4px; }
        .login-box input { width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; margin-bottom:16px; outline:none; }
        .login-box input:focus { border-color:#4f46e5; }
        .login-box button { width:100%; padding:11px; background:#4f46e5; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
        .login-box button:hover { background:#4338ca; }
        .error { background:#fee2e2; color:#dc2626; padding:10px; border-radius:8px; margin-bottom:16px; font-size:13px; text-align:center; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Super Admin</h2>
        <p>Faqat superuser kirishi mumkin</p>
        {% if messages %}{% for msg in messages %}<div class="error">{{ msg }}</div>{% endfor %}{% endif %}
        <form method="post">
            {% csrf_token %}
            <label>Username</label>
            <input type="text" name="username" required autofocus>
            <label>Parol</label>
            <input type="password" name="password" required>
            <button type="submit">Kirish</button>
        </form>
    </div>
</body>
</html>
